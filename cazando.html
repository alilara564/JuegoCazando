<!DOCTYPE html>
<html>
  <head>
    <title>Juego Cazando</title>
    <link rel="stylesheet" href="cazando.css"/>
  </head>
  <body>

    <h1>Juego Cazando</h1>
    <p>Autor: Ali Lara</p>

    <canvas id="areaJuego" width="500" height="500"></canvas>

    <div class="controles">
      <button id="botonArriba" onclick="arriba();">⬆</button>
      <br>
      <button id="botonIzquierda" onclick="izquierda();">⬅</button>
      <button id="botonAbajo" onclick="abajo();">⬇</button>
      <button id="botonDerecha" onclick="derecha();">➡</button>
    </div>


    <div class="panel">
      <span>Puntos: <span id="lblPuntos">0</span></span>
      <span>Tiempo: <span id="lblTiempo">12</span></span>
    </div>

    <div class="panel">
      <input type="button" value="INICIAR" onclick="jugar()">
      <input type="button" value="REINICIAR" onclick="reiniciarJuego()">
    </div>

    <p id="mensaje">GANASTE-PERDISTE</p>
    <script src="cazando.js"></script>
    <script src = "utils.js"></script>

  </body>
</html>
