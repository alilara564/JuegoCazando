<!DOCTYPE html>
<html>
  <head>
    <title>Juego Cazando</title>
    <link rel="stylesheet" href="cazando.css"/>
  </head>
  <body>

     

    <h1>Juego Cazando</h1>
    <p>Autor: Ali Lara</p>
    <input type="button" value = Iniciar onclick="iniciarJuego()"/>
    <span id = "lblTiempo" class = "panel">TIME</span>

    <canvas id="areaJuego" width="500" height="500"></canvas>

    <p id = lblPuntos>Puntos: 00</p>

    <div class="controles">
      <button id="botonArriba" onclick="arriba();">⬆</button>
      <br>
      <button id="botonIzquierda" onclick="izquierda();">⬅</button>
      <button id="botonAbajo" onclick="abajo();">⬇</button>
      <button id="botonDerecha" onclick="derecha();">➡</button>
    </div>


    <div class="panel">
      <span>Puntos: <span id="puntos">0</span></span>
      <span>Tiempo: <span id="tiempo">10</span></span>
    </div>

    <p id="mensaje"></p>
    <script src="cazando.js"></script>
    <script src = "utils.js"></script>

  </body>
</html>
